// Feishu WebSocket long-connection frame protocol (pbbp2).
// Field IDs reverse-engineered from the official @larksuiteoapi/node-sdk.
syntax = "proto3";
package pbbp2;

message Frame {
  uint64          seq_id            = 1;
  uint64          log_id            = 2;
  uint64          service           = 3;
  uint32          method            = 4;  // 0 = control (ping/pong), 1 = data (event)
  repeated Header headers           = 5;
  string          payload_encoding  = 6;
  string          payload_type      = 7;
  bytes           payload           = 8;
  string          log_id_new        = 9;
}

message Header {
  string key   = 1;
  string value = 2;
}
